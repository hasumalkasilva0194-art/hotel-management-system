  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">

        </a>

  <section id="team" class="team_wrapper">
    <div class="container">
      <!-- search -->
      <div class="container my-4">
        <div class="row justify-content-between">
          <div class="col-auto">
            <div class="d-flex align-items-center">
              <label style="width: 150px;">Filter by area: </label>
              <select name="area" id="area" class="form-control">
                <option value="all">All</option>
                <option value="kegalle">Kegalle</option>
                <option value="mawanella">Mawanella</option>
                <option value="rambukkana">Rambukkana</option>
                <option value="warakapola">Warakapola</option>
                <option value="aranayake">Aranayake</option>
                <option value="galigamuwa">Galigamuwa</option>
                <option value="deraniyagala">Deraniyagala</option>
                <option value="ruwanwella">Ruwanwella</option>
                <option value="hemmathagama">Hemmathagama</option>
                <option value="yatiyanthota">Yatiyanthota</option>
                <option value="pinnawala">Pinnawala</option>
              </select>
            </div>
          </div>
          <div class="col-auto">
            <div class="d-flex align-items-center">
              <input required class="form-control me-2" type="text" placeholder="Search" name="search" id="search"
                style="width: 200px;">
              <button class="btn btn-primary"><i class="fas fa-search"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="row" id="place-container"></div>

      <!-- Modal -->
      <div class="modal fade" id="hotelModal" tabindex="-1" aria-labelledby="hotelModalLabel" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="hotelModalLabel">More Details</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <img id="item-image" style="height: 300px;width: 100%;" src="" class="img-fluid mb-3" />
              <div class="d-flex">
                <h7 style="margin-right: 5px;">Name: </h7>
                <h7 id="item-name"></h7>
              </div>
              <div class="d-flex">
                <h7 style="margin-right: 5px;">City: </h7>
                <h7 id="item-city"></h7>
              </div>
              <div class="d-flex">
                <h7 style="margin-right: 5px;">Description: <span id="item-description"></span></h7>
              </div>
              <button id="location-popper" class="btn btn-sm btn-secondary my-2">Show Location</button>
              <div id="location-container" style="display: none;">
                <iframe id="item-location" src="" className="border" title="map" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                  style="border-width: 4px;border-color: #6c757d;width: 100%;height: 200px;"></iframe>
              </div>

            </div>
            <div class="modal-footer">
              <button class="btn btn-primary"><a id="item-google" href="" target="_blank" class="text-white">Visit
                  Website</a></button>

              <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>

  </section>
  <script>


    function generatePlaceCards(filteredPlaces) {
      const container = document.getElementById('place-container');
      if (filteredPlaces.length === 0) {
        const noResultsHTML = `
            <div class="col-12 text-center mt-5">
                <img src="./assets/images/others/no-result.png" alt="No results" class="img-fluid">
            </div>
        `;
        container.insertAdjacentHTML('beforeend', noResultsHTML);
      }

      filteredPlaces.forEach(item => {
        const cardHTML = `
            <div class="col-lg-3 col-md-6 mb-4">
                <div class="card p-0 rounded-3" onclick='openModal(${JSON.stringify(item)})'>
                    <span><img src="${item.image}" style="height: 300px;width: 350px;" class="rounded-3"></span>
                    <div class="team-info">
                        <h5>${item.name}</h5>
                        <p class="mb-2">${item.city}</p>
                        <ul class="social-network">
                            <li><a href="${item.fb}" class="text-white" target="blank"><i class="fab fa-facebook-f"></i></a></li>
                            <li><a href="${item.twitter}" class="text-white" target="blank"><i class="fab fa-twitter"></i></a></li>
                            <li><a href="${item.google}" class="text-white" target="blank"><i class="fab fa-google-plus-g"></i></a></li>
                            <li><a href="${item.telegram}" class="text-white" target="blank"><i class="fab fa-telegram"></i></a></li>
                        </ul>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    function openModal(item) {
      $('#location-popper').html('Show Location');
      $('#location-container').css('display', 'none');
      document.getElementById('item-image').src = item.image;
      document.getElementById('item-name').textContent = item.name;
      document.getElementById('item-city').textContent = item.city;
      document.getElementById('item-description').textContent = item.description || 'No description available';
      document.getElementById('item-google').href = item.google;
      document.getElementById('item-location').src = item.location;

      const modal = new bootstrap.Modal(document.getElementById('hotelModal'));
      modal.show();
    }

    $(document).ready(function () {
      $('#area').val('all');

      let places;
      // getPlaces from backend API
      $.ajax({
        url: `http://localhost:5000/api/getPlaces`,
        method: 'GET',
        success: function (response) {
          if (response.success) {
            places = response.places;
            generatePlaceCards(places);

          } else {
            console.error('Failed to retrieve places:', response.message);
          }
        },
        error: function (xhr, status, error) {
          console.error('AJAX request failed:', status, error);
        }
      });



      // search places
      $('#search').on('input', function () {
        const container = document.getElementById('place-container');
        container.innerHTML = '';
        const searchTerm = $(this).val().toLowerCase();

        const filteredPlaces = places.filter(item =>
          item.name.toLowerCase().includes(searchTerm) ||
          item.type.toLowerCase().includes(searchTerm)
        );

        generatePlaceCards(filteredPlaces);
      });

      // filter by area
      $('#area').on('change', function () {
        const container = document.getElementById('place-container');
        container.innerHTML = '';
        const selectedType = $(this).val().toLowerCase();

        if (selectedType == 'all') {
          generatePlaceCards(places);
          return
        }

        const filteredPlaces = places.filter(item =>
          item.city.toLowerCase() === selectedType
        );

        generatePlaceCards(filteredPlaces);
      });


      // show & hide location
      $('#location-popper').on('click', function () {
        const buttonText = $(this).text().trim();
        if (buttonText === 'Show Location') {
          $(this).html('Hide Location');
          $('#location-container').css('display', 'block');
        } else {
          $(this).html('Show Location');
          $('#location-container').css('display', 'none');
        }
      });
    });
  </script>
  <script>
    function logout() {
      sessionStorage.removeItem('userId');
      window.location = "./login.html";
    }
    $(document).ready(function () {
      if (sessionStorage.getItem('userId') == '' || !sessionStorage.getItem('userId')) {
        $('#authDiv').html(``);
      } else {
        $('#authDiv').html(`
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0);" onclick="logout()">
            <h5>Logout</h5>
          </a>
        </li>`);
      }
    });
  </script>
