          <ul class="navbar-nav me-auto">

  <section id="team" class="team_wrapper">
    <div class="container">
      <div class="row mt-3">
        <div class="col-sm-12 section-title text-center mb-0 mt-2 heading">
          <h3>Customer Reviews</h3>
          <div class="underline"></div>
        </div>
        <!-- <div class="col-sm-12 section-title text-center">
          <h3>Customer Reviews</h3>
        </div> -->
      </div>
      <div class="container">
        <div class="row row-cols-1 row-cols-md-3" id="review-container">

        </div>
      </div>

  </section>


  <script>
    let reviews;
    let places;
    let starCount;
    function getIDFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('placeId');
    }

    function logout() {
      sessionStorage.removeItem('userId');
      window.location = "./Login.html";
    }

    function generateReviewCards(filteredReviews) {
      const container = document.getElementById('review-container');
      container.innerHTML = '';

      if (filteredReviews.length === 0) {
        const noResultsHTML = `
            <div class="d-flex justify-content-center align-items-center" style="width:100%">
              <img src="./assets/images/others/no-result.png" alt="No results" class="img-fluid" style="height:250px">
            </div>

        `;
        container.insertAdjacentHTML('beforeend', noResultsHTML);
      }

      filteredReviews.forEach(item => {
        let stars = [];
        for (let i = 0; i < 5; i++) {
          if (i < item.star) {
            stars.push('<i class="fa fa-star text-warning fs-4"></i>');
          } else {
            stars.push('<i class="fa fa-star star-rating text-secondary fs-4"></i>');
          }
        }
        const cardHTML = `
        <div class="col mb-2">
            <div class="card shadow-lg">
              <div class="card-body">
                <div class="d-flex  justify-content-between align-items-center">
                  <h6 class="card-title" id="userName">by: ${item.user.firstName} ${item.user.lastName}</h6>
                  <h6 class="card-titl" id="hotelName">${item.place.name} - ${item.place.type}</h6>
                </div>
                <h6 id="hotelCity">City  - ${item.place.city}</h6>
                <div style="font-size: 14px;">
                ${item.description || 'No description available'}
                </div>
                <div class="d-flex justify-content-between align-items-center mt-2">
                  <div class="star-rating">
                    ${stars.join('')}
                  </div> 
                  <div>
                    <a class="text-white" target="_blank" href="${item.place.fb}">
                      <button class="btn btn-sm btn-primary px-3"><i class="fab fa-facebook"></i></button>
                    </a>
                    <a class="text-white" target="_blank" href="${item.place.google}">
                      <button class="btn btn-sm btn-primary px-3"><i class="fa fa-link"></i></button>
                    </a>
                  </div>
                  
                </div>

              </div>
            </div>
          </div>


        `;
        container.insertAdjacentHTML('beforeend', cardHTML);
      });
    }


    $(document).ready(function () {
      // Get the ID and from URL
      const placeId = getIDFromURL();
      if (sessionStorage.getItem('userId') == '' || !sessionStorage.getItem('userId')) {
        $('#authDiv').html(`
        <li class="nav-item">
          <a class="nav-link" href="Login.html">
            <h5>Login</h5>
          </a>
        </li>
        `);
      } else {
        $('#authDiv').html(`
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0);" onclick="logout()">
            <h5>Logout</h5>
          </a>
        </li>`);
      }
      // getReviews from backend API
      $.ajax({
        url: `http://localhost:5000/api/getReview/${placeId}`,
        method: 'GET',
        success: function (response) {
          if (response.success) {
            reviews = response.allReviews;
            generateReviewCards(reviews);
          } else {
            console.error('Failed to retrieve reviews:', response.message);
          }
        },
        error: function (xhr, status, error) {
          console.error('AJAX request failed:', status, error);
        }
      });
    });
  </script>
  <!-- Bootstrap JS and Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
