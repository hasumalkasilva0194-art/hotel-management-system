    <div class="form-container">
        <div class="reg-form">
            <form action="" id="loginForm" method="post">
                <div class="d-flex justify-content-center align-items-center text-lg fs-5 fw-bold mb-3">
                    Login
                </div>

                <div class="input-container form-group">
                    <span class="label-container">
                        <label for="">Email:</label>
                    </span>
                    <span>
                        <input required class="inp form-control" type="email" placeholder="Email address"
                            name="EmailAddress">
                    </span>
                </div>

                <div class="input-container form-group">
                    <span class="label-container">
                        <label for="">Password:</label>
                    </span>
                    <span>
                        <input required class="inp form-control" type="password" placeholder="Password" name="Password">
                    </span>
                </div>

                <div class="mt-3 d-flex justify-content-center align-items-center">
                    <button type="submit" class="btn btn-primary px-4" name="submit">Login</button>
                </div>
                <div id="signupContainer" class="d-flex justify-content-center align-items-center mt-3">
                    <span>Not registered yet?</span>
                    <a href="./Register.html" class="text-primary mx-2" id="signupLink">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function logout() {
            sessionStorage.removeItem('userId');
            location.reload();
        }
        $(document).ready(function () {
            if (sessionStorage.getItem('userId') == '' || !sessionStorage.getItem('userId')) {
                $('#authDiv').html(`
            <li class="nav-item">
                <a class="nav-link text-warning" href="./Register.html">
                    <h5>Sign-up</h5>
                </a>
            </li>`);
            } else {
                logout()
            }
        });
        $(document).ready(function () {
            $('#loginForm').on('submit', function (event) {
                event.preventDefault();

                const formData = {
                    email: $('input[name="EmailAddress"]').val(),
                    password: $('input[name="Password"]').val(),
                };

                $.ajax({
                    url: 'http://localhost:5000/api/auth/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(formData),
                    success: function (response) {
                        if (response.success) {
                            alert("Login successful!");
                            const userId = response.userId;
                            sessionStorage.setItem('userId', userId);
                            // console.log(sessionStorage.getItem('userId'))
                            window.location = "./review.html";
                        } else {
                            alert("login failed: " + response.message);
                        }
                    },
                    error: function (xhr, status, error) {
                        console.error("Error occurred during login:", error);
                        alert("An error occurred during login. Please try again.");
                    }
                });
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js"
